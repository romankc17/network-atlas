<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Network Atlas</title>
<style>
  html, body { margin: 0; height: 100%; background: #06080f; background: var(--space-void); overflow: hidden; }
  #root { position: fixed; inset: 0; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  /* Panel close (×) buttons are absolutely positioned in a header whose sibling content
     block (name/avatar) is position:relative and painted afterward — without this it
     overlays the button and swallows the click. Lift every panel close control above it. */
  button[aria-label="Close"] { z-index: 3; }
  @keyframes atlasFade { to { opacity: 0; visibility: hidden; } }
  @keyframes atlasPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.18); opacity: .55; } }
  .atlas-pulse { animation: atlasPulse 1.4s var(--ease-inout) infinite; }
  @keyframes atlasPop { from { opacity: 0; transform: translateY(6px) scale(.98); } to { opacity: 1; transform: none; } }
  .atlas-pop { animation: atlasPop var(--dur-panel) var(--ease-dive) both; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
